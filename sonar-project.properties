# SonarCloud project configuration for WellPath monorepo
# Docs: https://docs.sonarcloud.io/

sonar.projectKey=wellpath
sonar.organization=wellpath-org
sonar.projectName=WellPath

# Monorepo — analyze all three apps as one project
sonar.sources=apps/web/src,apps/api/src,apps/mobile/src,packages
sonar.sourceEncoding=UTF-8

# Language
sonar.javascript.lcov.reportPaths=
sonar.typescript.tsconfigPath=apps/web/tsconfig.json,apps/api/tsconfig.json,apps/mobile/tsconfig.json

# Exclude generated and dependency files
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.expo/**,\
  **/build/**,\
  **/*.min.js,\
  **/*.d.ts,\
  **/coverage/**,\
  apps/mobile/app/**,\
  **/scripts/**

# No tests yet — disable coverage gate
sonar.coverage.exclusions=**/*

# Quality Gate — skip coverage metric entirely
sonar.qualitygate.wait=true
